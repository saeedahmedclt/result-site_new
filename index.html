<!DOCTYPE html>
<html>
<head>

<title>Shamsul Huda Sunni Madrasa - Result Portal</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6f9;text-align:center;}
.header{background:#006400;color:white;padding:20px;}

.box{
background:white;
padding:20px;
margin:20px auto;
width:95%;
max-width:1200px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{padding:8px;margin:5px;width:95%;}

button{
padding:6px 12px;
margin:4px;
background:#006400;
color:white;
border:none;
cursor:pointer;
}

button:hover{background:#004d00;}

.subjectRow{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.subjectRow input{width:48%;}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
background:white;
}

table,th,td{border:1px solid #ccc;}

th,td{padding:6px;text-align:center;}

.passBox{background:#e6ffe6;color:#008000;border:2px solid #008000;}
.failBox{background:#ffe6e6;color:red;border:2px solid red;}

.statusBox{
margin-top:15px;
padding:12px;
font-size:20px;
font-weight:bold;
border-radius:8px;
width:200px;
margin:auto;
}

#adminPanel{display:none}

</style>

</head>

<body>

<div class="header">
<h1>Shamsul Huda Sunni Madrasa</h1>
<p>Official Examination Result Portal</p>
</div>

<div class="box">

<h3>Check Result</h3>

<input type="text" id="searchRoll" placeholder="Enter Register Number">

<button onclick="checkResult()">Check Result</button>

<div id="result"></div>

</div>

<div class="box">

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="loginMsg" style="color:red;"></p>

</div>

<div class="box" id="adminPanel">

<h3>Add Student</h3>

<input type="text" id="roll" placeholder="Register Number">

<input type="text" id="name" placeholder="Student Name">

<select id="class" onchange="loadSubjects()">

<option value="">Select Class</option>
<option value="1">Class 1</option>
<option value="2">Class 2</option>
<option value="3">Class 3</option>
<option value="4">Class 4</option>
<option value="5">Class 5</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="10">Class 10</option>
<option value="11">Class 11</option>
<option value="12">Class 12</option>

</select>

<div id="subjects"></div>

<button onclick="saveStudent()">Save Student</button>

</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyDg2bMhZMw9L26mgsSh5-DVUv7ZDzO3GBU",
authDomain: "madrasaresult-18fe1.firebaseapp.com",
databaseURL: "https://madrasaresult-18fe1-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "madrasaresult-18fe1",
storageBucket: "madrasaresult-18fe1.firebasestorage.app",
messagingSenderId: "925755456868",
appId: "1:925755456868:web:fe3a542ad1db35c1670e71",
measurementId: "G-HC0CFJHYNH"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();

var adminPassword="1234";

var classSubjects={

"1":["Duroosul Islam","Kithabath","Thafheemul Qura'an"],

"2":["Duroosul Islam","Kithabath","Thajweedul Qura'an","Qura'an Hifz","Practical"]

};

function login(){

if(document.getElementById("adminPass").value===adminPassword){

document.getElementById("adminPanel").style.display="block";

}else{

document.getElementById("loginMsg").innerHTML="Wrong Password";

}

}

function loadSubjects(){

var className=document.getElementById("class").value;

var container=document.getElementById("subjects");

container.innerHTML="";

if(classSubjects[className]){

classSubjects[className].forEach(function(sub){

container.innerHTML+=

"<div class='subjectRow'>"+
"<input type='text' value='"+sub+"' readonly>"+
"<input type='number' class='subMark' placeholder='Marks'>"+
"</div>";

});

}

}

function saveStudent(){

var roll=document.getElementById("roll").value;

var name=document.getElementById("name").value;

var className=document.getElementById("class").value;

var marks=document.getElementsByClassName("subMark");

var subjectsArr=[];

var total=0;

for(var i=0;i<marks.length;i++){

var mark=Number(marks[i].value);

subjectsArr.push({
name:classSubjects[className][i],
mark:mark
});

total+=mark;

}

var student={

roll:roll,
name:name,
className:className,
subjects:subjectsArr,
total:total

};

db.ref("students/"+roll).set(student);

alert("Student Saved");

}

function checkResult(){

var roll=document.getElementById("searchRoll").value;

db.ref("students/"+roll).once("value",function(snapshot){

var s=snapshot.val();

if(!s){

document.getElementById("result").innerHTML="Invalid Register Number";

return;

}

var table="<table><tr><th>Subject</th><th>Mark</th></tr>";

s.subjects.forEach(function(sub){

table+="<tr><td>"+sub.name+"</td><td>"+sub.mark+"</td></tr>";

});

table+="<tr><td>Total</td><td>"+s.total+"</td></tr></table>";

document.getElementById("result").innerHTML=

"<h3>"+s.name+"</h3>"+
"Class: "+s.className+"<br>"+
table;

});

}

</script>

</body>
</html>
