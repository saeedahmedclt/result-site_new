<!DOCTYPE html>
<html>
<head>

<title>Shamsul Huda Sunni Madrasa - Result Portal</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6f9;text-align:center;}

.header{
background:#006400;
color:white;
padding:20px;
}

.box{
background:white;
padding:20px;
margin:20px auto;
width:95%;
max-width:1200px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,select{
padding:8px;
margin:5px;
width:95%;
}

button{
padding:6px 12px;
margin:4px;
background:#006400;
color:white;
border:none;
cursor:pointer;
}

button:hover{background:#004d00;}

.deleteBtn{background:red;}
.editBtn{background:orange;}

.subjectRow{
display:flex;
justify-content:space-between;
margin:5px 0;
}

.subjectRow input{width:48%;}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
background:white;
font-size:13px;
}

table,th,td{border:1px solid #ccc;}
th,td{padding:6px;text-align:center;}

.passBox{background:#e6ffe6;color:#008000;border:2px solid #008000;}
.failBox{background:#ffe6e6;color:red;border:2px solid red;}

.statusBox{
margin-top:15px;
padding:12px;
font-size:20px;
font-weight:bold;
border-radius:8px;
width:200px;
margin:auto;
}

#adminPanel,#allSection{display:none;}

</style>

</head>

<body>

<div class="header">
<h1>Shamsul Huda Sunni Madrasa</h1>
<p>Official Examination Result Portal</p>
</div>

<div class="box">

<h3>Check Result</h3>

<input type="text" id="searchRoll" placeholder="Enter Register Number">
<button onclick="checkResult()">Check Result</button>

<div id="result"></div>

</div>

<div class="box">

<h3>Admin Login</h3>

<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="login()">Login</button>

<p id="loginMsg" style="color:red;"></p>

</div>

<div class="box" id="adminPanel">

<h3>Add / Edit Student</h3>

<input type="text" id="roll" placeholder="Register Number">
<input type="text" id="name" placeholder="Student Name">

<select id="class" onchange="loadSubjects()">

<option value="">Select Class</option>
<option value="1">Class 1</option>
<option value="2">Class 2</option>
<option value="3">Class 3</option>
<option value="4">Class 4</option>
<option value="5">Class 5</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="10">Class 10</option>
<option value="11">Class 11</option>
<option value="12">Class 12</option>

</select>

<div id="subjects"></div>

<button onclick="saveStudent()">Save Student</button>

</div>

<div class="box" id="allSection">

<h3>All Students</h3>

<div id="allResults"></div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "APIKEY",
authDomain: "DOMAIN",
databaseURL: "DBURL",
projectId: "PID"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();

var adminPassword="1234";

var classSubjects={

"6":["Duroosul Aqaed","Thareekhul Islam","Thajweedul & Thazkiya","Fiqhul Islam","Qura'an Hifz","Practical"],
"12":["Thafseer","Fiqh","Practical"]

};

function getGrade(mark){

if(mark>=90) return "A+";
if(mark>=80) return "A";
if(mark>=70) return "B";
if(mark>=60) return "C";
if(mark>=50) return "D";
return "F";

}

function login(){

if(document.getElementById("adminPass").value===adminPassword){

document.getElementById("adminPanel").style.display="block";
document.getElementById("allSection").style.display="block";

displayAll();

}else{

document.getElementById("loginMsg").innerHTML="Wrong Password";

}

}

function loadSubjects(){

var className=document.getElementById("class").value;
var container=document.getElementById("subjects");
container.innerHTML="";

if(classSubjects[className]){

classSubjects[className].forEach(function(sub){

container.innerHTML+=
"<div class='subjectRow'>"+
"<input type='text' value='"+sub+"' readonly>"+
"<input type='number' class='subMark' min='0' max='100'>"+
"</div>";

});

}

}

function saveStudent(){

var roll=document.getElementById("roll").value;
var name=document.getElementById("name").value;
var className=document.getElementById("class").value;

var marks=document.getElementsByClassName("subMark");

var subjectsArr=[];
var total=0;
var fail=false;

for(var i=0;i<marks.length;i++){

var mark=Number(marks[i].value);
var grade=getGrade(mark);

if(mark<40) fail=true;

subjectsArr.push({
name:classSubjects[className][i],
mark:mark,
grade:grade
});

total+=mark;

}

var status=fail?"FAIL":"PASS";

var student={
roll,
name,
className,
subjects:subjectsArr,
total,
status
};

db.ref("students/"+roll).set(student);

displayAll();

}

function displayAll(){

db.ref("students").once("value",function(snapshot){

var students=snapshot.val();

if(!students){
document.getElementById("allResults").innerHTML="No Students";
return;
}

var html="<table>";

html+="<tr><th>Roll</th><th>Name</th><th>Class</th>";

var firstStudent=Object.values(students)[0];

firstStudent.subjects.forEach(function(sub){
html+="<th>"+sub.name+"</th>";
});

html+="<th>Total</th><th>Status</th><th>Action</th></tr>";

Object.values(students).forEach(function(s){

var maxTotal=s.subjects.length*100;

html+="<tr>";

html+="<td>"+s.roll+"</td>";
html+="<td>"+s.name+"</td>";
html+="<td>"+s.className+"</td>";

s.subjects.forEach(function(sub){
html+="<td>"+sub.mark+"</td>";
});

html+="<td>"+s.total+" / "+maxTotal+"</td>";
html+="<td>"+s.status+"</td>";

html+="<td>";
html+="<button class='editBtn' onclick='editStudent(\""+s.roll+"\")'>Edit</button>";
html+="<button class='deleteBtn' onclick='deleteStudent(\""+s.roll+"\")'>Delete</button>";
html+="</td>";

html+="</tr>";

});

html+="</table>";

document.getElementById("allResults").innerHTML=html;

});

}

function deleteStudent(roll){

db.ref("students/"+roll).remove();
displayAll();

}

function editStudent(roll){

db.ref("students/"+roll).once("value",function(snapshot){

var s=snapshot.val();

document.getElementById("roll").value=s.roll;
document.getElementById("name").value=s.name;
document.getElementById("class").value=s.className;

loadSubjects();

setTimeout(function(){

var marks=document.getElementsByClassName("subMark");

s.subjects.forEach(function(sub,i){
marks[i].value=sub.mark;
});

},200);

});

}

function checkResult(){

var roll=document.getElementById("searchRoll").value;

db.ref("students/"+roll).once("value",function(snapshot){

var s=snapshot.val();

if(!s){
document.getElementById("result").innerHTML="Invalid Register Number";
return;
}

var maxTotal=s.subjects.length*100;

var table="<table>";
table+="<tr><th>Subject</th><th>Mark</th><th>Grade</th></tr>";

s.subjects.forEach(function(sub){

table+="<tr>";
table+="<td>"+sub.name+"</td>";
table+="<td>"+sub.mark+"</td>";
table+="<td>"+sub.grade+"</td>";
table+="</tr>";

});

table+="<tr><td><b>Total</b></td><td colspan='2'><b>"+s.total+" / "+maxTotal+"</b></td></tr>";

table+="</table>";

document.getElementById("result").innerHTML=

"<h3>Mark Sheet</h3>"+
"<b>Name:</b> "+s.name+"<br>"+
"<b>Register Number:</b> "+s.roll+"<br>"+
"<b>Class:</b> "+s.className+"<br><br>"+
table+
"<div class='statusBox'>"+s.status+"</div>";

});

}

</script>

</body>
</html>
