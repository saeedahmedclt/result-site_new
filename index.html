<!DOCTYPE html>
<html>
<head>
<title>Shamsul Huda Sunni Madrasa - Result Portal</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6f9;text-align:center;}
.header{background:#006400;color:white;padding:20px;}
.box{background:white;padding:20px;margin:20px auto;width:95%;max-width:1200px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input,select{padding:8px;margin:5px;width:95%;}
button{padding:6px 12px;margin:4px;background:#006400;color:white;border:none;cursor:pointer;}
button:hover{background:#004d00;}
.deleteBtn{background:red;}
.editBtn{background:orange;}
.subjectRow{display:flex;justify-content:space-between;margin:5px 0;}
.subjectRow input{width:48%;}
table{width:100%;margin-top:10px;border-collapse:collapse;background:white;font-size:13px;}
table,th,td{border:1px solid #ccc;}
th,td{padding:6px;text-align:center;}
.passBox{background:#e6ffe6;color:#008000;border:2px solid #008000;}
.failBox{background:#ffe6e6;color:red;border:2px solid red;}
.statusBox{margin-top:15px;padding:12px;font-size:20px;font-weight:bold;border-radius:8px;width:220px;margin:auto;}
#adminPanel,#allSection{display:none;}
/* NEW COLORS FOR STUDENT TABLE */
td.practicalCol{background:#d0e7ff;} /* Light Blue */
td.totalCol{background:#d4f4d4;}     /* Light Green */
</style>
</head>
<body>
<div class="header">
<h1>Shamsul Huda Sunni Madrasa</h1>
<p>Official Examination Result Portal</p>
</div>

<div class="box">
<h3>Check Result</h3>
<input type="text" id="searchRoll" placeholder="Enter Register Number">
<button onclick="checkResult()">Check Result</button>
<div id="result"></div>
</div>

<div class="box">
<h3>Admin Login</h3>
<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="login()">Login</button>
<p id="loginMsg" style="color:red;"></p>
</div>

<div class="box" id="adminPanel">
<h3>Add / Edit Student</h3>
<input type="text" id="roll" placeholder="Register Number">
<input type="text" id="name" placeholder="Student Name">
<select id="class" onchange="loadSubjects()">
<option value="">Select Class</option>
<option value="1">Class 1</option>
<option value="2">Class 2</option>
<option value="3">Class 3</option>
<option value="4">Class 4</option>
<option value="5">Class 5</option>
<option value="6">Class 6</option>
<option value="7">Class 7</option>
<option value="8">Class 8</option>
<option value="9">Class 9</option>
<option value="10">Class 10</option>
<option value="11">Class 11</option>
<option value="12">Class 12</option>
</select>
<div id="subjects"></div>
<button onclick="saveStudent()">Save Student</button>
</div>

<div class="box" id="allSection">
<h3>All Students</h3>
<button onclick="downloadCSV()">Download as Sheet</button>
<div id="allResults"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
apiKey: "AIzaSyDg2bMhZMw9L26mgsSh5-DVUv7ZDzO3GBU",
authDomain: "madrasaresult-18fe1.firebaseapp.com",
databaseURL: "https://madrasaresult-18fe1-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "madrasaresult-18fe1",
storageBucket: "madrasaresult-18fe1.firebasestorage.app",
messagingSenderId: "925755456868",
appId: "1:925755456868:web:fe3a542ad1db35c1670e71"
};
firebase.initializeApp(firebaseConfig);
var db=firebase.database();
var adminPassword="Ubaid@321";
var classSubjects={
"1":["Duroosul Islam","Kithabath","Thafheemul Quraan"],
"2":["Duroosul Islam","Kithabath","Thajweedul Quraan","Quraan Hifz","Practical"],
"3":["Duroosul Islam - 1","Duroosul Islam - 2","Thajweedul Quraan","Fiqhul Islam","Quraan Hifz","Practical"],
"4":["Duroosul Islam - 1","Duroosul Islam - 2","Thajweedul Quraan","Fiqhul Islam","Quraan Hifz","Practical"],
"5":["Duroosul Islam - 1","Duroosul Islam - 2","Thajweedul Quraan","Fiqhul Islam","Quraan Hifz","Practical"],
"6":["Duroosul Aqaed","Thareekhul Islam","Thajweedul & Thazkiya","Fiqhul Islam","Quraan Hifz","Practical"],
"7":["Duroosul Aqaed","Thareekhul Islam","Thajweedul & Thazkiya","Fiqhul Islam","Quraan Hifz","Practical"],
"8":["Duroosul Islam","Fiqhul Islam","Thazkiyathul Vildan","Quraan Hifz","Practical"],
"9":["Thareekhul Islam","Al Fiqh","Thazkiyathul Vildan","Quraan Hifz","Practical"],
"10":["Thareekhul Islam","Fiqh","Thazkiyathul Vildan","Practical"],
"11":["Duroosul Islam - 1","Duroosul Islam - 2","Quraan Hifz","Practical"],
"12":["Thafseer","Fiqh","Practical"]
};

function getGrade(p){
if(p>=96) return "A++";
else if(p>=90) return "A+";
else if(p>=80) return "A";
else if(p>=70) return "B+";
else if(p>=60) return "B";
else if(p>=50) return "C+";
else if(p>=40) return "C";
else return "Fail";
}

function login(){
if(document.getElementById("adminPass").value===adminPassword){
document.getElementById("adminPanel").style.display="block";
document.getElementById("allSection").style.display="block";
displayAll();
}else{
document.getElementById("loginMsg").innerHTML="Wrong Password";
}
}

function loadSubjects(selectedMarks=[]){
var cls=document.getElementById("class").value;
var container=document.getElementById("subjects");
container.innerHTML="";
if(classSubjects[cls]){
classSubjects[cls].forEach(function(sub,i){
var markValue=selectedMarks[i]||"";
container.innerHTML+= "<div class='subjectRow'>"+
"<input type='text' value='"+sub+"' readonly>"+
"<input type='number' class='subMark' value='"+markValue+"' min='0' max='100' placeholder='Marks'>"+
"</div>";
});
}
}

function saveStudent(){
var roll=document.getElementById("roll").value;
var name=document.getElementById("name").value;
var cls=document.getElementById("class").value;
if(!roll || !name || !cls){
alert("Fill all fields"); return;
}
var subjectsArr=[]; var total=0; var fail=false;
var marks=document.getElementsByClassName("subMark");
for(var i=0;i<marks.length;i++){
var m=Number(marks[i].value);
/* VALIDATION: Marks cannot be >100 or <0 */
if(m>100 || m<0){
alert("Marks must be between 0 and 100");
marks[i].focus();
return;
}
subjectsArr.push({ name:classSubjects[cls][i], mark:m, grade:getGrade(m) });
total+=m; if(m<40) fail=true;
}
var status=fail?"FAIL":"PASS";
var student={ roll:roll, name:name, className:cls, subjects:subjectsArr, total:total, maxTotal:marks.length*100, status:status };
db.ref("students/"+roll).set(student);
alert("Student Saved!");
displayAll();
clearForm();
}

function clearForm(){
document.getElementById("roll").value="";
document.getElementById("name").value="";
document.getElementById("class").value="";
document.getElementById("subjects").innerHTML="";
}

function displayAll(){
var allSubjects=new Set();
Object.values(classSubjects).forEach(arr=>{ arr.forEach(s=>allSubjects.add(s)); });
allSubjects=[...allSubjects];
db.ref("students").once("value",function(snapshot){
var students=snapshot.val();
if(!students){ document.getElementById("allResults").innerHTML="No Students"; return; }
var html="<table>";
html+="<tr>";
html+="<th>Roll</th>";
html+="<th>Name</th>";
html+="<th>Class</th>";
allSubjects.forEach(sub=>{ html+="<th>"+sub+"</th>"; });
html+="<th>Total</th>";
html+="<th>Status</th>";
html+="<th>Action</th>";
html+="</tr>";

Object.keys(students).forEach(function(key){
var s=students[key];
var marksMap={};
s.subjects.forEach(sub=>{ marksMap[sub.name]=sub.mark; });
html+="<tr>";
html+="<td>"+s.roll+"</td>";
html+="<td>"+s.name+"</td>";
html+="<td>"+s.className+"</td>";
allSubjects.forEach(sub=>{
var cls="";
if(sub.toLowerCase()=="practical") cls="practicalCol";
html+="<td class='"+cls+"'>"+(marksMap[sub]!==undefined?marksMap[sub]:"-")+"</td>";
});
html+="<td class='totalCol'>"+s.total+" / "+s.maxTotal+"</td>";
html+="<td>"+s.status+"</td>";
html+="<td><button class='editBtn' onclick='editStudent(\""+s.roll+"\")'>Edit</button> <button class='deleteBtn' onclick='deleteStudent(\""+s.roll+"\")'>Delete</button></td>";
html+="</tr>";
});
html+="</table>";
document.getElementById("allResults").innerHTML=html;
});
}

function checkResult(){
var roll=document.getElementById("searchRoll").value;
db.ref("students/"+roll).once("value").then(snapshot=>{
var s=snapshot.val();
if(!s){ document.getElementById("result").innerHTML="Invalid Register Number"; return; }
var table="<table>";
table+="<tr><th>Subject</th><th>Mark</th><th>Grade</th></tr>";
s.subjects.forEach(function(sub){
table+="<tr>";
table+="<td>"+sub.name+"</td>";
table+="<td>"+sub.mark+"</td>";
table+="<td>"+getGrade(sub.mark)+"</td>";
table+="</tr>";
});
table+="<tr><td>Total</td><td colspan='2'><b>"+s.total+" / "+s.maxTotal+"</b></td></tr>"; // Total in bold
var statusClass=s.status=="PASS"?"passBox":"failBox";
document.getElementById("result").innerHTML=
"<h3>"+s.name+"</h3>"+
"Roll: "+s.roll+"<br>"+
"Class: "+s.className+
table+
"<div class='statusBox "+statusClass+"'>"+s.status+"</div>"; // PASS/FAIL below table
});
}

function editStudent(roll){
db.ref("students/"+roll).once("value").then(snap=>{
var s=snap.val();
document.getElementById("roll").value=s.roll;
document.getElementById("name").value=s.name;
document.getElementById("class").value=s.className;
loadSubjects(s.subjects.map(x=>x.mark));
});
}

function deleteStudent(roll){
if(confirm("Delete student?")){
db.ref("students/"+roll).remove();
displayAll();
}
}

function downloadCSV(){
db.ref("students").once("value").then(snapshot=>{
var students=snapshot.val();
if(!students){ alert("No data to download"); return; }
var allSubjects=new Set();
Object.values(classSubjects).forEach(arr=>{ arr.forEach(s=>allSubjects.add(s)); });
allSubjects=[...allSubjects];
var csv="Roll,Name,Class,"+allSubjects.join(",")+",Total,Status\n";
Object.keys(students).forEach(key=>{
var s=students[key];
var marksMap={};
s.subjects.forEach(sub=>{ marksMap[sub.name]=sub.mark; });
var row=[s.roll,s.name,s.className];
allSubjects.forEach(sub=>{
row.push(marksMap[sub]!==undefined?marksMap[sub]:"-");
});
row.push(s.total+" / "+s.maxTotal);
row.push(s.status);
csv+=row.join(",")+"\n";
});
var blob=new Blob([csv],{type:"text/csv"});
var url=URL.createObjectURL(blob);
var a=document.createElement("a");
a.href=url;
a.download="student_list.csv";
a.click();
URL.revokeObjectURL(url);
});
}
</script>
</body>
</html>
