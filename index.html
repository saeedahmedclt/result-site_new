```html
<!DOCTYPE html>
<html>
<head>
<title>Madrasa Result System</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
padding:20px;
}

h2{
margin-top:30px;
}

input,select{
padding:8px;
margin:5px;
}

button{
padding:8px 15px;
margin:5px;
cursor:pointer;
}

table{
border-collapse:collapse;
width:100%;
background:white;
margin-top:20px;
font-size:13px;
}

th,td{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

th{
background:#eee;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

#adminPanel{
display:none;
}

</style>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey:"YOURKEY",
authDomain:"YOURDOMAIN",
databaseURL:"YOURDBURL",
projectId:"YOURID",
storageBucket:"",
messagingSenderId:"",
appId:""
};

firebase.initializeApp(firebaseConfig);

var db=firebase.database();


var adminPassword="Ubaid@321";


var subjects=[
"Duroosul Islam",
"Kithabath",
"Thafheemul Qura'an",
"Thajweedul Qura'an",
"Qura'an Hifz",
"Practical",
"Duroosul Islam - 1",
"Duroosul Islam - 2",
"Fiqhul Islam",
"Duroosul Aqaed",
"Thareekhul Islam",
"Thajweedul & Thazkiya",
"Thazkiyathul Vildan",
"Al Fiqh",
"Fiqh",
"Thafseer"
];


function getGrade(p){

if(p>=96) return "A++";
else if(p>=90) return "A+";
else if(p>=80) return "A";
else if(p>=70) return "B+";
else if(p>=60) return "B";
else if(p>=50) return "C+";
else if(p>=40) return "C";
else return "Fail";

}


function login(){

var p=document.getElementById("adminPass").value;

if(p==adminPassword){

document.getElementById("adminPanel").style.display="block";

}else{

alert("Wrong password");

}

}


function addStudent(){

var roll=document.getElementById("roll").value;
var name=document.getElementById("name").value;
var cls=document.getElementById("class").value;

var marks={};

var total=0;
var fail=false;

subjects.forEach(function(s){

var v=document.getElementById("s_"+s)?.value;

if(v){

v=parseInt(v);
marks[s]=v;
total+=v;

if(v<40) fail=true;

}

});


var status=fail?"FAIL":"PASS";


db.ref("students/"+roll).set({

roll:roll,
name:name,
className:cls,
marks:marks,
total:total,
status:status

});

alert("Saved");

loadStudents();

}


function loadStudents(){

db.ref("students").once("value",function(snapshot){

var data=snapshot.val();

var html="<table>";

html+="<tr>";
html+="<th>Roll</th>";
html+="<th>Name</th>";
html+="<th>Class</th>";

subjects.forEach(function(s){
html+="<th>"+s+"</th>";
});

html+="<th>Total</th>";
html+="<th>Status</th>";
html+="</tr>";

for(var k in data){

var s=data[k];

html+="<tr>";

html+="<td>"+s.roll+"</td>";
html+="<td>"+s.name+"</td>";
html+="<td>"+s.className+"</td>";

subjects.forEach(function(sub){

var v=s.marks[sub];

if(v==undefined) v="-";

html+="<td>"+v+"</td>";

});

html+="<td>"+s.total+"</td>";

html+="<td class='"+(s.status=="PASS"?"pass":"fail")+"'>"+s.status+"</td>";

html+="</tr>";

}

html+="</table>";

document.getElementById("studentsTable").innerHTML=html;

});

}


function checkResult(){

var roll=document.getElementById("searchRoll").value;

db.ref("students/"+roll).once("value",function(snapshot){

var s=snapshot.val();

if(!s){

document.getElementById("result").innerHTML="Invalid Register Number";
return;

}

var table="<table>";

table+="<tr><th>Subject</th><th>Mark</th><th>Grade</th></tr>";

for(var sub in s.marks){

var m=s.marks[sub];
var g=getGrade(m);

table+="<tr>";
table+="<td>"+sub+"</td>";
table+="<td>"+m+" / 100</td>";
table+="<td>"+g+"</td>";
table+="</tr>";

}

var totalMax=Object.keys(s.marks).length*100;

table+="<tr><td><b>Total</b></td><td colspan='2'><b>"+s.total+" / "+totalMax+"</b></td></tr>";

table+="</table>";

document.getElementById("result").innerHTML=

"<h3>"+s.name+"</h3>"+
"Register Number: "+s.roll+"<br>"+
"Class: "+s.className+
table+
"<br><b>Status: "+s.status+"</b>";

});

}



function createInputs(){

var html="";

subjects.forEach(function(s){

html+="<div>"+s+" : <input type='number' id='s_"+s+"'></div>";

});

document.getElementById("subjectInputs").innerHTML=html;

}

window.onload=function(){

createInputs();
loadStudents();

}

</script>


</head>


<body>


<h2>Check Result</h2>

<input id="searchRoll" placeholder="Register Number">

<button onclick="checkResult()">Check</button>

<div id="result"></div>



<h2>Admin Login</h2>

<input type="password" id="adminPass" placeholder="Password">

<button onclick="login()">Login</button>



<div id="adminPanel">


<h2>Add Student</h2>

Roll<br>
<input id="roll"><br>

Name<br>
<input id="name"><br>

Class<br>
<input id="class"><br>


<h3>Marks</h3>

<div id="subjectInputs"></div>


<button onclick="addStudent()">Save Student</button>


<h2>All Students</h2>

<div id="studentsTable"></div>


</div>


</body>
</html>
```
